<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POG マネージャー</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');
:root {
  --bg: #f7f6f3;
  --bg2: #ffffff;
  --bg3: #f0efe9;
  --bg4: #e4e3db;
  --border: rgba(0,0,0,0.07);
  --border2: rgba(0,0,0,0.14);
  --text: #1a1a18;
  --text2: #52524a;
  --text3: #999890;
  --accent: #4a42e0;
  --gold: #a07810;
  --silver: #666070;
  --bronze: #8c4820;
  --green: #207050;
  --r: 6px; --rl: 10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:14px;line-height:1.6;}
a{color:var(--accent);text-decoration:none;}

header{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,0.05);}
.logo{font-family:'JetBrains Mono',monospace;font-weight:600;font-size:16px;color:var(--accent);}

.app{display:flex;height:calc(100vh - 50px);}
.sidebar{width:200px;min-width:200px;background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;padding:10px 0;}
.main{flex:1;overflow-y:auto;}

/* SIDEBAR */
.sb-label{font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--text3);text-transform:uppercase;padding:10px 14px 4px;}
.sb-item{padding:7px 12px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);display:flex;align-items:center;justify-content:space-between;transition:background .1s;}
.sb-item:hover{background:var(--bg3);color:var(--text);}
.sb-item.active{background:var(--accent);color:#fff;}
.sb-cnt{font-size:10px;font-family:'JetBrains Mono',monospace;background:rgba(0,0,0,.08);padding:1px 5px;border-radius:3px;}
.sb-item.active .sb-cnt{background:rgba(255,255,255,.25);}
.sb-div{height:1px;background:var(--border);margin:8px 0;}

/* TABS */
.tab-bar{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);padding:0 20px;}
.tab-btn{padding:11px 18px;font-size:13px;font-weight:500;color:var(--text3);border:none;background:transparent;cursor:pointer;font-family:'Noto Sans JP',sans-serif;border-bottom:2px solid transparent;transition:all .12s;}
.tab-btn:hover{color:var(--text);}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}

.page{padding:20px 24px;display:none;}
.page.active{display:block;}

/* TABLE */
.tbl-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;margin-bottom:16px;}
.tbl-wrap table{width:100%;border-collapse:collapse;}
.tbl-wrap th{background:var(--bg3);padding:8px 12px;text-align:left;font-size:11px;font-weight:700;letter-spacing:.07em;color:var(--text3);text-transform:uppercase;white-space:nowrap;cursor:pointer;user-select:none;}
.tbl-wrap th:hover{background:var(--bg4);}
.tbl-wrap th.sort-asc::after{content:' ↑';}
.tbl-wrap th.sort-desc::after{content:' ↓';}
.tbl-wrap td{padding:8px 12px;border-top:1px solid var(--border);font-size:13px;vertical-align:middle;}
.tbl-wrap tbody tr:hover td{background:var(--bg3);}
.clickable{cursor:pointer;}

/* RANKING cells */
.season-cell{text-align:right;white-space:nowrap;}
.season-cell .rank{font-size:11px;color:var(--text3);margin-right:4px;}
.season-cell .money{font-family:'JetBrains Mono',monospace;font-weight:600;}
.r1 .money{color:var(--gold);}
.r2 .money{color:var(--silver);}
.r3 .money{color:var(--bronze);}
.season-cell.absent{color:var(--text3);font-size:12px;text-align:right;}
.season-header{text-align:right;}
.avg-cell{font-family:'JetBrains Mono',monospace;font-size:12px;}

/* HORSE TABLE */
.sex-m{color:#205090;font-weight:600;}
.sex-f{color:#a02060;font-weight:600;}
.sex-g{color:#602080;font-weight:600;}
.result-val{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text2);}
.nb-link{font-size:11px;color:var(--accent);}
.ketto{font-size:11px;color:var(--text2);line-height:1.4;}
.season-badge{display:inline-block;background:var(--bg4);color:var(--text2);font-size:10px;padding:1px 6px;border-radius:3px;font-family:'JetBrains Mono',monospace;}
.gen-badge{display:inline-block;background:#e8f0fb;color:#2050a0;font-size:10px;padding:1px 6px;border-radius:3px;}

/* FILTER BAR */
.filter-bar{display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap;}
.filter-btn{padding:5px 12px;border-radius:20px;border:1px solid var(--border2);background:var(--bg2);color:var(--text2);font-size:12px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all .12s;}
.filter-btn:hover{border-color:var(--accent);color:var(--accent);}
.filter-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}

/* USER HORSE PANEL */
.panel-header{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.panel-header h3{font-size:15px;font-weight:700;}
.back-btn{font-size:12px;color:var(--text2);cursor:pointer;background:none;border:1px solid var(--border2);padding:4px 10px;border-radius:var(--r);font-family:'Noto Sans JP',sans-serif;}
.back-btn:hover{border-color:var(--accent);color:var(--accent);}

/* IMPORT MODAL */
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:200;align-items:center;justify-content:center;}
.modal-ov.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--rl);padding:20px;width:500px;max-width:95vw;box-shadow:0 4px 20px rgba(0,0,0,.1);}
.modal h3{font-size:14px;font-weight:700;margin-bottom:10px;}
.modal p{font-size:12px;color:var(--text2);margin-bottom:10px;}
.modal-foot{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;}
.form-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;}
.form-row label{font-size:12px;color:var(--text2);width:70px;flex-shrink:0;}
.form-row input{flex:1;background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:13px;padding:6px 10px;border-radius:var(--r);outline:none;}
.form-row input:focus{border-color:var(--accent);}
textarea.ta{width:100%;background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:11px;padding:8px;border-radius:var(--r);outline:none;resize:vertical;min-height:100px;}
textarea.ta:focus{border-color:var(--accent);}
.btn{background:var(--accent);color:#fff;border:none;padding:7px 16px;border-radius:var(--r);cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:500;}
.btn:hover{opacity:.85;}
.btn-s{background:var(--bg3);border:1px solid var(--border2);color:var(--text);}
.btn-s:hover{opacity:1;background:var(--bg4);}

.notify{position:fixed;bottom:18px;right:18px;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--rl);padding:9px 15px;font-size:12px;z-index:300;opacity:0;transform:translateY(5px);transition:all .2s;pointer-events:none;box-shadow:0 2px 8px rgba(0,0,0,.1);}
.notify.show{opacity:1;transform:none;}
.notify.ok{border-color:var(--green);color:var(--green);}
.notify.err{border-color:#c03030;color:#c03030;}
.loading{padding:40px;text-align:center;color:var(--text3);font-size:13px;}
</style>
</head>
<body>

<header>
  <div class="logo">POG★</div>
  <div class="tab-bar" style="border:none;padding:0;flex:1;">
    <button class="tab-btn active" onclick="switchTab('ranking')">ランキング</button>
    <button class="tab-btn" onclick="switchTab('horses')">馬一覧</button>
  </div>
  <div style="margin-left:auto;">
    <button class="btn btn-s" onclick="openImport()" style="font-size:12px;padding:5px 12px;">＋ データ追加</button>
  </div>
</header>

<div class="app">
  <div class="sidebar">
    <div class="sb-label">シーズン</div>
    <div id="seasonList"></div>
  </div>

  <div class="main">
    <!-- RANKING PAGE -->
    <div class="page active" id="page-ranking">
      <div id="rankingContent"><div class="loading">読み込み中...</div></div>
    </div>

    <!-- HORSES PAGE -->
    <div class="page" id="page-horses">
      <div id="horsesContent"><div class="loading">読み込み中...</div></div>
    </div>
  </div>
</div>

<!-- IMPORT MODAL -->
<div class="modal-ov" id="importModal">
  <div class="modal">
    <h3>📋 HTMLからデータ取り込み</h3>
    <p>POGスタリオンのグループ一覧ページで <strong>Ctrl+U</strong> してHTMLを貼り付け。JSONをダウンロードして data/ に保存後、manifest.json に追記してください。</p>
    <div class="form-row"><label>シーズン名</label><input type="text" id="imp-season" placeholder="例: スマ勢25-26"></div>
    <div class="form-row"><label>期間</label><input type="text" id="imp-year" placeholder="例: 2025/05/25〜2026/06/01"></div>
    <div class="form-row"><label>生年</label><input type="text" id="imp-gen" placeholder="例: 2023年生まれ"></div>
    <textarea class="ta" id="imp-html" placeholder="HTMLを貼り付け..."></textarea>
    <div class="modal-foot">
      <button class="btn btn-s" onclick="closeImport()">キャンセル</button>
      <button class="btn" onclick="doImport()">JSONを出力</button>
    </div>
  </div>
</div>
<div class="notify" id="notify"></div>

<script>
// ===== STATE =====
let seasons = {};
let manifest = [];
let currentSeason = null;
let currentTab = 'ranking';
let horseFilter = 'all'; // all or season key
let horseUser = null;    // null = 全員, string = user name
let sortCol = 'avg';
let sortDir = 1; // 1=asc -1=desc

// ===== INIT =====
async function init() {
  try {
    const res = await fetch('data/manifest.json');
    manifest = (await res.json()).seasons;
    renderSidebar();
    if (manifest.length > 0) await loadSeason(manifest[0].key);
  } catch(e) {
    document.getElementById('rankingContent').innerHTML = '<div class="loading">manifest.json が見つかりません</div>';
  }
}

async function loadSeason(key) {
  if (!seasons[key]) {
    const entry = manifest.find(m => m.key === key);
    if (!entry) return;
    const res = await fetch(entry.file);
    seasons[key] = await res.json();
  }
  currentSeason = key;
  renderSidebar();
  render();
}

// ===== SIDEBAR =====
function renderSidebar() {
  const list = document.getElementById('seasonList');
  list.innerHTML = '';
  manifest.forEach(m => {
    const s = seasons[m.key];
    const cnt = s ? Object.keys(s.users).length : '?';
    const div = document.createElement('div');
    div.className = 'sb-item' + (currentSeason === m.key ? ' active' : '');
    div.innerHTML = `<span>${m.name}</span><span class="sb-cnt">${cnt}人</span>`;
    div.onclick = () => loadSeason(m.key);
    list.appendChild(div);
  });
}

// ===== TAB =====
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', ['ranking','horses'][i] === tab));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + tab).classList.add('active');
  render();
}

function render() {
  if (currentTab === 'ranking') renderRanking();
  else renderHorses();
}

// ===== RANKING =====
function renderRanking() {
  const el = document.getElementById('rankingContent');
  if (!currentSeason) { el.innerHTML = '<div class="loading">シーズンを選択してください</div>'; return; }

  // 全シーズン読み込み済みのものだけ使う
  const loadedKeys = manifest.filter(m => seasons[m.key]).map(m => m.key);
  // 全ユーザー名を集める
  const allNames = new Set();
  loadedKeys.forEach(k => Object.values(seasons[k].users).forEach(u => allNames.add(u.name)));

  // ユーザーごとに各シーズンの賞金・順位を集計
  const rows = [];
  allNames.forEach(name => {
    const entries = [];
    loadedKeys.forEach(k => {
      const s = seasons[k];
      const users = Object.values(s.users).sort((a,b) => b.money - a.money);
      const idx = users.findIndex(u => u.name === name);
      if (idx >= 0) {
        entries.push({ key: k, rank: idx + 1, money: users[idx].money, total: users.length });
      }
    });
    if (entries.length === 0) return;
    const avgRank = entries.reduce((s, e) => s + e.rank, 0) / entries.length;
    const avgMoney = Math.round(entries.reduce((s, e) => s + e.money, 0) / entries.length);
    rows.push({ name, entries, avgRank, avgMoney });
  });

  // sort
  rows.sort((a, b) => {
    let av = a[sortCol === 'avg' ? 'avgRank' : 'avgMoney'];
    let bv = b[sortCol === 'avg' ? 'avgRank' : 'avgMoney'];
    if (sortCol === 'avg') return sortDir * (av - bv);
    return sortDir * (bv - av); // money desc by default
  });

  const rankLabel = (rank, money, total) => {
    const cls = rank === 1 ? 'r1' : rank === 2 ? 'r2' : rank === 3 ? 'r3' : '';
    const medal = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : '';
    return `<div class="season-cell ${cls}"><span class="rank">${medal || rank+'位'}</span><span class="money">${money.toLocaleString()}</span></div>`;
  };

  let h = `<div class="tbl-wrap"><table><thead><tr>
    <th>ユーザー</th>
    ${loadedKeys.map(k => `<th class="season-header" onclick="toggleSort('season_${k}')" id="th_season_${k}">${seasons[k].meta.name}</th>`).join('')}
    <th onclick="toggleSort('avg')" id="th_avg" class="sort-asc">平均順位</th>
    <th onclick="toggleSort('money')" id="th_money">平均賞金</th>
  </tr></thead><tbody>`;

  rows.forEach(row => {
    h += `<tr>`;
    h += `<td style="font-weight:500;">${row.name}</td>`;
    loadedKeys.forEach(k => {
      const e = row.entries.find(e => e.key === k);
      h += `<td>${e ? rankLabel(e.rank, e.money, e.total) : '<div class="season-cell absent">—</div>'}</td>`;
    });
    h += `<td class="avg-cell" style="text-align:right;">${row.avgRank.toFixed(1)}</td>`;
    h += `<td class="avg-cell" style="text-align:right;">${row.avgMoney.toLocaleString()}</td>`;
    h += `</tr>`;
  });
  h += `</tbody></table></div>`;

  // まだ読み込んでいないシーズンがあれば読み込みボタン
  const unloaded = manifest.filter(m => !seasons[m.key]);
  if (unloaded.length > 0) {
    h += `<p style="font-size:12px;color:var(--text3);">他のシーズンを読み込むとランキングに追加されます：`;
    unloaded.forEach(m => {
      h += `<button class="filter-btn" style="margin-left:6px;" onclick="loadSeason('${m.key}').then(renderRanking)">${m.name}</button>`;
    });
    h += `</p>`;
  }

  el.innerHTML = h;
  updateSortHeaders();
}

function toggleSort(col) {
  if (sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = col === 'avg' ? 1 : -1; }
  renderRanking();
}

function updateSortHeaders() {
  document.querySelectorAll('.tbl-wrap th').forEach(th => {
    th.classList.remove('sort-asc','sort-desc');
  });
  const id = sortCol.startsWith('season') ? `th_${sortCol}` : `th_${sortCol}`;
  const el = document.getElementById(id);
  if (el) el.classList.add(sortDir === 1 ? 'sort-asc' : 'sort-desc');
}

// ===== HORSES =====
function renderHorses() {
  const el = document.getElementById('horsesContent');

  if (horseUser) {
    renderUserHorses(el);
    return;
  }

  // 全馬一覧（シーズンフィルター付き）
  const loadedKeys = manifest.filter(m => seasons[m.key]).map(m => m.key);

  let allHorses = [];
  loadedKeys.forEach(k => {
    const s = seasons[k];
    Object.values(s.users).forEach(u => {
      (u.horses || []).forEach(h => {
        if (h.name && h.name.trim()) {
          allHorses.push({ ...h, owner: u.name, seasonKey: k, seasonName: s.meta.name, generation: s.meta.generation });
        }
      });
    });
  });

  // フィルター
  const filtered = horseFilter === 'all' ? allHorses : allHorses.filter(h => h.seasonKey === horseFilter);
  filtered.sort((a, b) => b.money - a.money);

  let h = `<div style="padding:16px 24px 0;">`;
  // フィルターボタン
  h += `<div class="filter-bar">
    <span style="font-size:12px;color:var(--text3);">シーズン：</span>
    <button class="filter-btn ${horseFilter==='all'?'active':''}" onclick="setHorseFilter('all')">全て</button>`;
  loadedKeys.forEach(k => {
    h += `<button class="filter-btn ${horseFilter===k?'active':''}" onclick="setHorseFilter('${k}')">${seasons[k].meta.name}</button>`;
  });
  h += `</div>`;

  h += `<div class="tbl-wrap"><table><thead><tr>
    <th></th><th>馬名</th><th>シーズン</th><th>生年</th><th>オーナー</th><th>性</th><th>成績</th>
    <th style="text-align:right;">本賞金</th><th style="text-align:right;">収得</th>
    <th>厩舎</th><th>血統</th><th></th>
  </tr></thead><tbody>`;

  filtered.forEach((hr, i) => {
    const sc = hr.sex==='牝'?'sex-f':hr.sex==='セ'?'sex-g':'sex-m';
    h += `<tr class="clickable" onclick="setHorseUser('${hr.owner}','${hr.seasonKey}')">
      <td style="color:var(--text3);font-size:11px;text-align:right;">${i+1}</td>
      <td style="font-weight:500;white-space:nowrap;">${hr.name}</td>
      <td><span class="season-badge">${hr.seasonName}</span></td>
      <td><span class="gen-badge">${hr.generation||''}</span></td>
      <td style="font-size:12px;color:var(--text2);">${hr.owner}</td>
      <td class="${sc}">${hr.sex||''}</td>
      <td><span class="result-val">${hr.result||''}</span></td>
      <td style="text-align:right;font-family:'JetBrains Mono',monospace;font-weight:600;">${(hr.money||0).toLocaleString()}</td>
      <td style="text-align:right;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text2);">${(hr.syutoku||0).toLocaleString()}</td>
      <td style="font-size:11px;white-space:nowrap;">${hr.stable||''} <span style="color:var(--text3);">${hr.area||''}</span></td>
      <td class="ketto">父${hr.sire||'-'}<br>母${hr.dam||'-'}</td>
      <td>${hr.kettonum?`<a class="nb-link" href="https://db.netkeiba.com/horse/${hr.kettonum}" target="_blank" onclick="event.stopPropagation()">▼</a>`:''}</td>
    </tr>`;
  });
  h += `</tbody></table></div></div>`;
  el.innerHTML = h;
}

function renderUserHorses(el) {
  // horseUser = {name, seasonKey}
  const s = seasons[horseUser.seasonKey];
  const u = Object.values(s.users).find(u => u.name === horseUser.name);
  if (!u) { horseUser = null; renderHorses(); return; }

  const horses = (u.horses || []).filter(h => h.name && h.name.trim()).sort((a,b) => b.money - a.money);
  const total = horses.reduce((n,h) => n + (h.money||0), 0);

  let h = `<div style="padding:16px 24px 0;">`;
  h += `<div class="panel-header">
    <button class="back-btn" onclick="horseUser=null;renderHorses()">← 全馬一覧</button>
    <h3>${u.name} <span class="season-badge" style="font-size:12px;">${s.meta.name}</span> <span class="gen-badge">${s.meta.generation||''}</span></h3>
    <span style="font-family:'JetBrains Mono',monospace;font-weight:600;color:#186858;margin-left:auto;">計 ${total.toLocaleString()} 万</span>
  </div>`;

  h += `<div class="tbl-wrap"><table><thead><tr>
    <th>No</th><th>馬名</th><th>性</th><th>成績</th>
    <th style="text-align:right;">本賞金</th><th style="text-align:right;">収得</th>
    <th>厩舎</th><th>血統</th><th></th>
  </tr></thead><tbody>`;

  horses.forEach(hr => {
    const sc = hr.sex==='牝'?'sex-f':hr.sex==='セ'?'sex-g':'sex-m';
    h += `<tr>
      <td style="color:var(--text3);font-size:12px;">${hr.no||''}</td>
      <td style="font-weight:500;white-space:nowrap;">${hr.name}</td>
      <td class="${sc}">${hr.sex||''}</td>
      <td><span class="result-val">${hr.result||''}</span></td>
      <td style="text-align:right;font-family:'JetBrains Mono',monospace;font-weight:600;">${(hr.money||0).toLocaleString()}</td>
      <td style="text-align:right;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text2);">${(hr.syutoku||0).toLocaleString()}</td>
      <td style="font-size:11px;white-space:nowrap;">${hr.stable||''} <span style="color:var(--text3);">${hr.area||''}</span></td>
      <td class="ketto">父${hr.sire||'-'}<br>母${hr.dam||'-'}</td>
      <td>${hr.kettonum?`<a class="nb-link" href="https://db.netkeiba.com/horse/${hr.kettonum}" target="_blank">▼</a>`:''}</td>
    </tr>`;
  });
  h += `</tbody></table></div></div>`;
  el.innerHTML = h;
}

function setHorseFilter(key) {
  horseFilter = key;
  horseUser = null;
  renderHorses();
}

function setHorseUser(name, seasonKey) {
  horseUser = { name, seasonKey };
  switchTab('horses');
}

// ===== IMPORT =====
function openImport() { document.getElementById('importModal').classList.add('open'); }
function closeImport() { document.getElementById('importModal').classList.remove('open'); }

function doImport() {
  const htmlStr = document.getElementById('imp-html').value.trim();
  const seasonName = document.getElementById('imp-season').value.trim();
  const seasonYear = document.getElementById('imp-year').value.trim();
  const seasonGen = document.getElementById('imp-gen').value.trim();
  if (!htmlStr) { notify('HTMLを貼り付けてください','err'); return; }
  const doc = new DOMParser().parseFromString(htmlStr, 'text/html');
  if (!doc.querySelector('.grouplist tbody')) { notify('グループ一覧ページのHTMLを貼り付けてください','err'); return; }

  const rows = doc.querySelectorAll('.grouplist tbody tr');
  const users = {};
  rows.forEach(row => {
    const a = row.querySelector('td.user a');
    const moneyEl = row.querySelector('td.money');
    if (!a || !moneyEl) return;
    const m = (a.getAttribute('href')||'').match(/user_num=(\d+)/);
    const userNum = m ? m[1] : Date.now().toString();
    users[userNum] = { name: a.textContent.trim(), money: parseInt(moneyEl.textContent.replace(/,/g,''))||0, horses: [] };
  });

  const h3 = doc.querySelector('.grouplist h3');
  const name = seasonName || (h3 ? h3.textContent.replace(/\(.*\)/,'').trim() : '新シーズン');
  const data = { meta: { name, year: seasonYear, groupNum: '', generation: seasonGen }, users };

  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `${name}.json`; a.click();
  notify(`「${name}」のJSONを出力しました`, 'ok');
  closeImport();
}

function notify(msg, type='ok') {
  const el = document.getElementById('notify');
  el.textContent = msg; el.className = `notify show ${type}`;
  clearTimeout(el._t); el._t = setTimeout(() => el.classList.remove('show'), 3500);
}

document.querySelectorAll('.modal-ov').forEach(el => el.addEventListener('click', function(e) {
  if (e.target === this) this.classList.remove('open');
}));

init();
</script>
