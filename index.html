<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POG マネージャー</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');
:root {
  --bg:#f7f6f3;--bg2:#fff;--bg3:#f0efe9;--bg4:#e4e3db;
  --border:rgba(0,0,0,.07);--border2:rgba(0,0,0,.14);
  --text:#1a1a18;--text2:#52524a;--text3:#999890;
  --accent:#4a42e0;--gold:#a07810;--silver:#606070;--bronze:#8c4820;--green:#207050;
  --r:6px;--rl:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:14px;line-height:1.6;}
a{color:var(--accent);text-decoration:none;}

header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.05);}
.logo{font-family:'JetBrains Mono',monospace;font-weight:600;font-size:15px;color:var(--accent);margin-right:16px;padding:14px 0;}
.tab-btn{padding:14px 16px;font-size:13px;font-weight:500;color:var(--text3);border:none;background:transparent;cursor:pointer;font-family:'Noto Sans JP',sans-serif;border-bottom:2px solid transparent;transition:all .12s;}
.tab-btn:hover{color:var(--text);}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
.hdr-right{margin-left:auto;padding:8px 0;}

.app{display:flex;height:calc(100vh - 50px);}
.sidebar{width:200px;min-width:200px;background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;padding:10px 0;}
.main{flex:1;overflow-y:auto;padding:20px 24px;}

.sb-label{font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--text3);text-transform:uppercase;padding:10px 14px 4px;}
.sb-item{padding:7px 12px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);display:flex;align-items:center;justify-content:space-between;transition:background .1s;}
.sb-item:hover{background:var(--bg3);color:var(--text);}
.sb-item.active{background:var(--accent);color:#fff;}
.sb-cnt{font-size:10px;font-family:'JetBrains Mono',monospace;background:rgba(0,0,0,.08);padding:1px 5px;border-radius:3px;}
.sb-item.active .sb-cnt{background:rgba(255,255,255,.25);}

.tbl-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;margin-bottom:16px;}
.tbl-wrap table{width:100%;border-collapse:collapse;}
.tbl-wrap th{background:var(--bg3);padding:8px 12px;text-align:left;font-size:11px;font-weight:700;letter-spacing:.07em;color:var(--text3);text-transform:uppercase;white-space:nowrap;user-select:none;}
.tbl-wrap td{padding:8px 12px;border-top:1px solid var(--border);font-size:13px;vertical-align:middle;}
.tbl-wrap tbody tr:hover td{background:var(--bg3);}
.cur{cursor:pointer;}

.sc{text-align:right;white-space:nowrap;}
.sc .rk{font-size:11px;color:var(--text3);margin-right:3px;}
.sc .mn{font-family:'JetBrains Mono',monospace;font-weight:600;}
.g1 .mn{color:var(--gold);}
.g2 .mn{color:var(--silver);}
.g3 .mn{color:var(--bronze);}
.mono{font-family:'JetBrains Mono',monospace;}
.sex-m{color:#205090;font-weight:600;}
.sex-f{color:#a02060;font-weight:600;}
.sex-g{color:#602080;font-weight:600;}
.res{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text2);}
.ketto{font-size:11px;color:var(--text2);line-height:1.5;}
.nblink{font-size:11px;color:var(--accent);}
.sbadge{display:inline-block;background:var(--bg4);color:var(--text2);font-size:10px;padding:1px 6px;border-radius:3px;font-family:'JetBrains Mono',monospace;}
.gbadge{display:inline-block;background:#e8f0fb;color:#2050a0;font-size:10px;padding:1px 6px;border-radius:3px;}

.back-btn{font-size:12px;color:var(--text2);cursor:pointer;background:none;border:1px solid var(--border2);padding:4px 10px;border-radius:var(--r);font-family:'Noto Sans JP',sans-serif;margin-bottom:14px;}
.back-btn:hover{border-color:var(--accent);color:var(--accent);}
.ph{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.ph h3{font-size:15px;font-weight:700;}
.sec-head{display:flex;align-items:baseline;gap:10px;margin-bottom:12px;}
.sec-head h2{font-size:16px;font-weight:700;}
.sec-meta{font-size:12px;color:var(--text2);}

.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:200;align-items:center;justify-content:center;}
.modal-ov.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--rl);padding:20px;width:500px;max-width:95vw;box-shadow:0 4px 20px rgba(0,0,0,.1);}
.modal h3{font-size:14px;font-weight:700;margin-bottom:10px;}
.modal p{font-size:12px;color:var(--text2);margin-bottom:10px;}
.mf{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;}
.fr{display:flex;gap:8px;align-items:center;margin-bottom:8px;}
.fr label{font-size:12px;color:var(--text2);width:70px;flex-shrink:0;}
.fr input{flex:1;background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:13px;padding:6px 10px;border-radius:var(--r);outline:none;}
.fr input:focus{border-color:var(--accent);}
textarea.ta{width:100%;background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:11px;padding:8px;border-radius:var(--r);outline:none;resize:vertical;min-height:100px;}
.btn{background:var(--accent);color:#fff;border:none;padding:7px 16px;border-radius:var(--r);cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:500;}
.btn:hover{opacity:.85;}
.btn-s{background:var(--bg3);border:1px solid var(--border2);color:var(--text);}
.notify{position:fixed;bottom:18px;right:18px;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--rl);padding:9px 15px;font-size:12px;z-index:300;opacity:0;transform:translateY(5px);transition:all .2s;pointer-events:none;box-shadow:0 2px 8px rgba(0,0,0,.1);}
.notify.show{opacity:1;transform:none;}
.notify.ok{border-color:var(--green);color:var(--green);}
.notify.err{border-color:#c03030;color:#c03030;}
.loading{padding:40px;text-align:center;color:var(--text3);font-size:13px;}

/* シーズン成績タブ：プレイヤーカード */
.player-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-bottom:16px;}
.player-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:14px 16px;cursor:pointer;transition:border-color .12s,box-shadow .12s;}
.player-card:hover{border-color:var(--accent);box-shadow:0 2px 8px rgba(74,66,224,.1);}
.pc-head{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.pc-rank{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;color:var(--text3);width:36px;text-align:center;}
.pc-rank.r1{color:var(--gold);}
.pc-rank.r2{color:var(--silver);}
.pc-rank.r3{color:var(--bronze);}
.pc-name{font-size:14px;font-weight:700;flex:1;}
.pc-money{font-family:'JetBrains Mono',monospace;font-weight:600;font-size:14px;color:var(--green);}
.pc-horses{font-size:11px;color:var(--text3);margin-top:2px;}
.pc-top{font-size:11px;color:var(--text2);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
</style>
</head>
<body>
<header>
  <div class="logo">POG★</div>
  <button class="tab-btn active" id="tab-season" onclick="switchTab('season')">シーズン成績</button>
  <button class="tab-btn" id="tab-horses" onclick="switchTab('horses')">馬一覧</button>
  <div class="hdr-right">
    <button class="btn btn-s" onclick="openImport()" style="font-size:12px;padding:5px 12px;">＋ データ追加</button>
  </div>
</header>

<div class="app">
  <div class="sidebar">
    <div class="sb-label">シーズン</div>
    <div id="seasonList"></div>
  </div>
  <div class="main" id="mainArea">
    <div class="loading">読み込み中...</div>
  </div>
</div>

<div class="modal-ov" id="importModal">
  <div class="modal">
    <h3>📋 HTMLからデータ取り込み</h3>
    <p>グループ一覧ページで <strong>Ctrl+U</strong> → HTMLを貼り付け → JSONをダウンロードして data/ に保存、manifest.json に追記してください。</p>
    <div class="fr"><label>シーズン名</label><input type="text" id="imp-season" placeholder="例: スマ勢25-26"></div>
    <div class="fr"><label>期間</label><input type="text" id="imp-year" placeholder="例: 2025/05/25〜2026/06/01"></div>
    <div class="fr"><label>生年</label><input type="text" id="imp-gen" placeholder="例: 2023年生まれ"></div>
    <textarea class="ta" id="imp-html" placeholder="HTMLを貼り付け..."></textarea>
    <div class="mf">
      <button class="btn btn-s" onclick="closeImport()">キャンセル</button>
      <button class="btn" onclick="doImport()">JSONを出力</button>
    </div>
  </div>
</div>
<div class="notify" id="notify"></div>

<script>
// ===== STATE =====
let seasons = {};
let manifest = [];
let currentSeason = null;
let currentTab = 'season';
let viewingUser = null;  // nullなら一覧、文字列ならそのユーザーの馬

// ===== INIT =====
async function init() {
  try {
    const res = await fetch('data/manifest.json');
    manifest = (await res.json()).seasons;
    renderSidebar();
    if (manifest.length > 0) {
      await loadAndSelect(manifest[0].key);
    }
  } catch(e) {
    document.getElementById('mainArea').innerHTML = '<div class="loading">manifest.json が読み込めません</div>';
  }
}

async function loadAndSelect(key) {
  if (!seasons[key]) {
    const entry = manifest.find(m => m.key === key);
    if (!entry) return;
    try {
      const res = await fetch(entry.file);
      seasons[key] = await res.json();
    } catch(e) {
      notify(`${key} の読み込みに失敗しました`, 'err');
      return;
    }
  }
  currentSeason = key;
  viewingUser = null;
  renderSidebar();
  render();
}

// ===== SIDEBAR =====
function renderSidebar() {
  const list = document.getElementById('seasonList');
  list.innerHTML = '';
  manifest.forEach(m => {
    const s = seasons[m.key];
    const cnt = s ? Object.keys(s.users).length : '?';
    const div = document.createElement('div');
    div.className = 'sb-item' + (currentSeason === m.key ? ' active' : '');
    div.innerHTML = `<span>${m.name}</span><span class="sb-cnt">${cnt}人</span>`;
    div.onclick = () => loadAndSelect(m.key);
    list.appendChild(div);
  });
}

// ===== TAB SWITCH =====
function switchTab(tab) {
  currentTab = tab;
  viewingUser = null;
  document.getElementById('tab-season').classList.toggle('active', tab === 'season');
  document.getElementById('tab-horses').classList.toggle('active', tab === 'horses');
  render();
}

function render() {
  if (!currentSeason || !seasons[currentSeason]) return;
  if (currentTab === 'season') renderSeason();
  else renderHorses();
}

// ===== シーズン成績タブ =====
// プレイヤー一覧カード → クリックで指名馬10頭

function renderSeason() {
  if (viewingUser) {
    renderUserHorsesInSeason();
  } else {
    renderSeasonTop();
  }
}

function renderSeasonTop() {
  const el = document.getElementById('mainArea');
  const s = seasons[currentSeason];
  const meta = s.meta;

  // 賞金順にソート
  const users = Object.values(s.users).sort((a, b) => b.money - a.money);

  const medal = r => r === 1 ? '🥇' : r === 2 ? '🥈' : r === 3 ? '🥉' : r;
  const rankCls = r => r === 1 ? 'r1' : r === 2 ? 'r2' : r === 3 ? 'r3' : '';

  let h = `<div class="sec-head">
    <h2>🏆 ${meta.name}</h2>
    <span class="sbadge">${meta.year || ''}</span>
    <span class="gbadge">${meta.generation || ''}</span>
    <span class="sec-meta">${users.length}人参加</span>
  </div>`;

  h += `<div class="player-grid">`;
  users.forEach((u, i) => {
    const rank = i + 1;
    const topHorse = (u.horses || []).filter(h => h.name).sort((a, b) => b.money - a.money)[0];
    const escapedName = u.name.replace(/'/g, "\\'");
    h += `<div class="player-card" onclick="showUserHorsesInSeason('${escapedName}')">
      <div class="pc-head">
        <div class="pc-rank ${rankCls(rank)}">${rank <= 3 ? medal(rank) : rank}</div>
        <div class="pc-name">${u.name}</div>
        <div class="pc-money">${(u.money || 0).toLocaleString()} 万</div>
      </div>
      <div class="pc-horses">${(u.horses || []).filter(h => h.name).length}頭指名</div>
      ${topHorse ? `<div class="pc-top">▲ ${topHorse.name}（${(topHorse.money || 0).toLocaleString()}万）</div>` : ''}
    </div>`;
  });
  h += `</div>`;

  el.innerHTML = h;
}

function showUserHorsesInSeason(name) {
  viewingUser = name;
  renderUserHorsesInSeason();
}

function renderUserHorsesInSeason() {
  const el = document.getElementById('mainArea');
  const s = seasons[currentSeason];
  const u = Object.values(s.users).find(u => u.name === viewingUser);
  if (!u) { viewingUser = null; renderSeasonTop(); return; }

  const horses = (u.horses || []).filter(h => h.name && h.name.trim()).sort((a, b) => b.money - a.money);
  const total = horses.reduce((n, h) => n + (h.money || 0), 0);

  let h = `<button class="back-btn" onclick="viewingUser=null;renderSeasonTop()">← ${s.meta.name} 一覧に戻る</button>`;
  h += `<div class="ph">
    <h3>${u.name}</h3>
    <span class="sbadge">${s.meta.name}</span>
    <span class="gbadge">${s.meta.generation || ''}</span>
    <span style="margin-left:auto;font-family:'JetBrains Mono',monospace;font-weight:600;color:var(--green);">計 ${total.toLocaleString()} 万</span>
  </div>`;

  h += `<div class="tbl-wrap"><table><thead><tr>
    <th>No</th><th>馬名</th><th>性</th><th>成績</th>
    <th style="text-align:right;">本賞金</th><th style="text-align:right;">収得</th>
    <th>厩舎</th><th>血統</th><th></th>
  </tr></thead><tbody>`;

  horses.forEach(hr => {
    const sc = hr.sex === '牝' ? 'sex-f' : hr.sex === 'セ' ? 'sex-g' : 'sex-m';
    h += `<tr>
      <td style="color:var(--text3);font-size:12px;">${hr.no || ''}</td>
      <td style="font-weight:500;white-space:nowrap;">${hr.name}</td>
      <td class="${sc}">${hr.sex || ''}</td>
      <td><span class="res">${hr.result || ''}</span></td>
      <td style="text-align:right;" class="mono">${(hr.money || 0).toLocaleString()}</td>
      <td style="text-align:right;font-size:11px;color:var(--text2);" class="mono">${(hr.syutoku || 0).toLocaleString()}</td>
      <td style="font-size:11px;white-space:nowrap;">${hr.stable || ''} <span style="color:var(--text3);">${hr.area || ''}</span></td>
      <td class="ketto">父${hr.sire || '—'}<br>母${hr.dam || '—'}</td>
      <td>${hr.kettonum ? `<a class="nblink" href="https://db.netkeiba.com/horse/${hr.kettonum}" target="_blank">▼</a>` : ''}</td>
    </tr>`;
  });

  h += `</tbody></table></div>`;
  el.innerHTML = h;
}

// ===== 馬一覧タブ =====
// currentSeason の全馬を賞金順、オーナー名クリックで絞り込み

function renderHorses() {
  if (viewingUser) {
    renderUserHorsesAll();
  } else {
    renderAllHorses();
  }
}

function renderAllHorses() {
  const el = document.getElementById('mainArea');
  const s = seasons[currentSeason];
  const meta = s.meta;

  const allHorses = [];
  Object.values(s.users).forEach(u => {
    (u.horses || []).filter(h => h.name && h.name.trim()).forEach(h => {
      allHorses.push({ ...h, ownerName: u.name });
    });
  });
  allHorses.sort((a, b) => b.money - a.money);

  let h = `<div class="sec-head">
    <h2>🐎 馬一覧</h2>
    <span class="sbadge">${meta.name}</span>
    <span class="gbadge">${meta.generation || ''}</span>
    <span class="sec-meta">${allHorses.length}頭</span>
  </div>`;

  h += `<div class="tbl-wrap"><table><thead><tr>
    <th></th><th>馬名</th><th>オーナー</th><th>性</th><th>成績</th>
    <th style="text-align:right;">本賞金</th><th style="text-align:right;">収得</th>
    <th>厩舎</th><th>血統</th><th></th>
  </tr></thead><tbody>`;

  allHorses.forEach((hr, i) => {
    const sc = hr.sex === '牝' ? 'sex-f' : hr.sex === 'セ' ? 'sex-g' : 'sex-m';
    const escapedName = hr.ownerName.replace(/'/g, "\\'");
    h += `<tr class="cur" onclick="showUserHorsesAll('${escapedName}')">
      <td style="color:var(--text3);font-size:11px;text-align:right;">${i + 1}</td>
      <td style="font-weight:500;white-space:nowrap;">${hr.name}</td>
      <td style="font-size:12px;color:var(--accent);font-weight:500;">${hr.ownerName}</td>
      <td class="${sc}">${hr.sex || ''}</td>
      <td><span class="res">${hr.result || ''}</span></td>
      <td style="text-align:right;" class="mono">${(hr.money || 0).toLocaleString()}</td>
      <td style="text-align:right;font-size:11px;color:var(--text2);" class="mono">${(hr.syutoku || 0).toLocaleString()}</td>
      <td style="font-size:11px;white-space:nowrap;">${hr.stable || ''} <span style="color:var(--text3);">${hr.area || ''}</span></td>
      <td class="ketto">父${hr.sire || '—'}<br>母${hr.dam || '—'}</td>
      <td>${hr.kettonum ? `<a class="nblink" href="https://db.netkeiba.com/horse/${hr.kettonum}" target="_blank" onclick="event.stopPropagation()">▼</a>` : ''}</td>
    </tr>`;
  });

  h += `</tbody></table></div>`;
  el.innerHTML = h;
}

function showUserHorsesAll(name) {
  viewingUser = name;
  renderUserHorsesAll();
}

function renderUserHorsesAll() {
  const el = document.getElementById('mainArea');
  const s = seasons[currentSeason];
  const u = Object.values(s.users).find(u => u.name === viewingUser);
  if (!u) { viewingUser = null; renderAllHorses(); return; }

  const horses = (u.horses || []).filter(h => h.name && h.name.trim()).sort((a, b) => b.money - a.money);
  const total = horses.reduce((n, h) => n + (h.money || 0), 0);

  let h = `<button class="back-btn" onclick="viewingUser=null;renderAllHorses()">← 全馬一覧に戻る</button>`;
  h += `<div class="ph">
    <h3>${u.name}</h3>
    <span class="sbadge">${s.meta.name}</span>
    <span class="gbadge">${s.meta.generation || ''}</span>
    <span style="margin-left:auto;font-family:'JetBrains Mono',monospace;font-weight:600;color:var(--green);">計 ${total.toLocaleString()} 万</span>
  </div>`;

  h += `<div class="tbl-wrap"><table><thead><tr>
    <th>No</th><th>馬名</th><th>性</th><th>成績</th>
    <th style="text-align:right;">本賞金</th><th style="text-align:right;">収得</th>
    <th>厩舎</th><th>血統</th><th></th>
  </tr></thead><tbody>`;

  horses.forEach(hr => {
    const sc = hr.sex === '牝' ? 'sex-f' : hr.sex === 'セ' ? 'sex-g' : 'sex-m';
    h += `<tr>
      <td style="color:var(--text3);font-size:12px;">${hr.no || ''}</td>
      <td style="font-weight:500;white-space:nowrap;">${hr.name}</td>
      <td class="${sc}">${hr.sex || ''}</td>
      <td><span class="res">${hr.result || ''}</span></td>
      <td style="text-align:right;" class="mono">${(hr.money || 0).toLocaleString()}</td>
      <td style="text-align:right;font-size:11px;color:var(--text2);" class="mono">${(hr.syutoku || 0).toLocaleString()}</td>
      <td style="font-size:11px;white-space:nowrap;">${hr.stable || ''} <span style="color:var(--text3);">${hr.area || ''}</span></td>
      <td class="ketto">父${hr.sire || '—'}<br>母${hr.dam || '—'}</td>
      <td>${hr.kettonum ? `<a class="nblink" href="https://db.netkeiba.com/horse/${hr.kettonum}" target="_blank">▼</a>` : ''}</td>
    </tr>`;
  });

  h += `</tbody></table></div>`;
  el.innerHTML = h;
}

// ===== IMPORT =====
function openImport() { document.getElementById('importModal').classList.add('open'); }
function closeImport() { document.getElementById('importModal').classList.remove('open'); }

function doImport() {
  const htmlStr = document.getElementById('imp-html').value.trim();
  const seasonName = document.getElementById('imp-season').value.trim();
  const seasonYear = document.getElementById('imp-year').value.trim();
  const seasonGen = document.getElementById('imp-gen').value.trim();
  if (!htmlStr) { notify('HTMLを貼り付けてください', 'err'); return; }
  const doc = new DOMParser().parseFromString(htmlStr, 'text/html');
  if (!doc.querySelector('.grouplist tbody')) { notify('グループ一覧ページのHTMLを貼り付けてください', 'err'); return; }
  const rows = doc.querySelectorAll('.grouplist tbody tr');
  const users = {};
  rows.forEach(row => {
    const a = row.querySelector('td.user a');
    const moneyEl = row.querySelector('td.money');
    if (!a || !moneyEl) return;
    const m = (a.getAttribute('href') || '').match(/user_num=(\d+)/);
    const userNum = m ? m[1] : Date.now().toString();
    users[userNum] = { name: a.textContent.trim(), money: parseInt(moneyEl.textContent.replace(/,/g, '')) || 0, horses: [] };
  });
  const h3 = doc.querySelector('.grouplist h3');
  const name = seasonName || (h3 ? h3.textContent.replace(/\(.*\)/, '').trim() : '新シーズン');
  const data = { meta: { name, year: seasonYear, groupNum: '', generation: seasonGen }, users };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `${name}.json`; a.click();
  notify(`「${name}」のJSONを出力しました`, 'ok');
  closeImport();
}

function notify(msg, type = 'ok') {
  const el = document.getElementById('notify');
  el.textContent = msg; el.className = `notify show ${type}`;
  clearTimeout(el._t); el._t = setTimeout(() => el.classList.remove('show'), 3500);
}

document.querySelectorAll('.modal-ov').forEach(el => el.addEventListener('click', function(e) {
  if (e.target === this) this.classList.remove('open');
}));

init();
</script>
</body>
</html>
